# Application
spring.application.name=clt-backend

# DataSource - PostgreSQL (credenciales por variable de entorno o valor por defecto)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Paraguay2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway: si el esquema ya tiene tablas (p. ej. por Hibernate), crear tabla de historial y hacer baseline
spring.flyway.baseline-on-migrate=true

# JWT - Access token 10 min, refresh token 7 días, reset token 1 hora
jwt.secret=${JWT_SECRET:CltSecretKeyParaJWT256BitsMinimoParaSeguridadHS256MuyLarga}
jwt.expiration-ms=600000
jwt.refresh-expiration-ms=604800000
jwt.reset-expiration-ms=3600000

# URL base del frontend (para enlace de restablecer contraseña en el email)
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Mail - SMTP para enviar emails (forgot-password). Variables: MAIL_USER, MAIL_PASSWORD.
# Si no las defines, el enlace de restablecimiento se imprime en la consola del backend.
# Gmail: usa contraseña de aplicación (Google Cuenta → Seguridad → Verificación en 2 pasos → Contraseñas de aplicaciones).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=8080

# SpringDoc OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false
