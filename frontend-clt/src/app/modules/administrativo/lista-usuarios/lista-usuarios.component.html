<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb
        [title]="breadscrum.title"
        [items]="breadscrum.items"
        [active_item]="breadscrum.active"
      >
      </app-breadcrumb>
    </div>
    }
    <mat-form-field appearance="outline">
      <mat-label>Filtro</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        placeholder="Ej. promotor/a"
        #input
      />
    </mat-form-field>

    <section class="example-container mat-elevation-z8" tabindex="0">
      <mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z8 mat-sort-header"
      >
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>No.</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="usuario">
          <th mat-header-cell *matHeaderCellDef>Usuario</th>
          <td mat-cell *matCellDef="let element">
            {{ element.nombre }}
          </td>
        </ng-container>

        <!-- Usuario Column -->
        <ng-container matColumnDef="usuarioLogin">
          <th mat-header-cell *matHeaderCellDef>Usuario sesion</th>
          <td mat-cell *matCellDef="let element">{{ element.usuario }}</td>
        </ng-container>

        <!-- Telefono Column -->
        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef>Telefono</th>
          <td mat-cell *matCellDef="let element">{{ element.telefono }}</td>
        </ng-container>

        <!-- Created At Column -->
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Creado en</th>
          <td mat-cell *matCellDef="let element">{{ element.createdAt }}</td>
        </ng-container>

        <!-- Created At Column -->
        <ng-container matColumnDef="editar">
          <th mat-header-cell *matHeaderCellDef>Editar</th>
          <td mat-cell *matCellDef="let element">
            <button
              mat-icon-button
              color="primary"
              (click)="
                openEditModal(
                  element.id,
                  element.nombre,
                  element.idHorario,
                  element.telefono
                )
              "
            >
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns; sticky: true"
        ></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
          <td *ngIf="consultandoDatos" class="mat-cell" colspan="7">
            <div *ngIf="consultandoDatos" class="loading-overlay">
              <mat-spinner diameter="48"></mat-spinner>
              <span class="loading-message">Consultando datos...</span>
            </div>
          </td>
        </tr>
      </mat-table>
      <mat-paginator
        [pageSize]="5"
        [pageSizeOptions]="[5, 10, 25]"
      ></mat-paginator>
    </section>
  </div>
</section>
