<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb
        [title]="breadscrum.title"
        [items]="breadscrum.items"
        [active_item]="breadscrum.active"
      >
      </app-breadcrumb>
    </div>
    }
    <div class="container">
      <mat-form-field>
        <mat-label>Ingrese rango de fechas</mat-label>
        <mat-date-range-input [rangePicker]="picker">
          <input
            matStartDate
            placeholder="Start date"
            [(ngModel)]="startDate"
          />
          <input matEndDate placeholder="End date" [(ngModel)]="endDate" />
        </mat-date-range-input>
        <mat-datepicker-toggle
          matIconSuffix
          [for]="picker"
        ></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
      </mat-form-field>

      <button
        *ngIf="!isLoading"
        mat-raised-button
        color="primary"
        (click)="buscar()"
      >
        <mat-icon>track_changes</mat-icon> Buscar
      </button>
      <button mat-raised-button color="primary" *ngIf="isLoading">
        Buscando...
        <mat-icon
          ><mat-spinner color="accent" diameter="19"> </mat-spinner
        ></mat-icon>
      </button>
      <br />
      <!-- Basic Examples -->
      <div class="row clearfix">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <div class="card">
            <div class="body">
              <div class="row">
                <div class="col-sm-12">
                  <div class="ngxTableHeader">
                    <ul class="header-buttons-left ms-0 mb-0">
                      <li class="dropdown">
                        <h2>Inventario</h2>
                      </li>
                      <li class="dropdown m-l-20">
                        <label for="search-input"
                          ><i class="material-icons search-icon"
                            >search</i
                          ></label
                        >
                        <input
                          placeholder="Buscar"
                          type="text"
                          class="browser-default search-field"
                          (keyup)="filterDatatable($event)"
                          aria-label="Search box"
                        />
                      </li>
                    </ul>
                    <ul class="header-buttons">
                      <li>
                        <div class="export-button m-l-10" matTooltip="XLSX">
                          <img
                            src="assets/images/icons/xlsx.png"
                            alt=""
                            (click)="exportArray()"
                          />
                        </div>
                      </li>
                    </ul>
                  </div>
                  <ngx-datatable
                    #table
                    class="material"
                    [rows]="data"
                    [columns]="columns"
                    [sortType]="SortType.multi"
                    [headerHeight]="50"
                    [footerHeight]="50"
                    [limit]="10"
                    rowHeight="auto"
                  >
                    <ngx-datatable-column
                      name="Secuencia"
                    ></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Punto de venta"
                      prop="ocrdName"
                    ></ngx-datatable-column>
                    <ngx-datatable-column name="Codigo"></ngx-datatable-column>
                    <ngx-datatable-column
                      name="itemName"
                    ></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Cod. barra"
                      prop="codbarra"
                    ></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Cantidad"
                    ></ngx-datatable-column>
                    <ngx-datatable-column name="Lote"></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Fecha"
                      prop="createdAt"
                    ></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Ubicacion"
                      prop="ubicacion"
                    ></ngx-datatable-column>
                    <ngx-datatable-column
                      name="Usuario"
                      prop="userName"
                    ></ngx-datatable-column>
                  </ngx-datatable>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
