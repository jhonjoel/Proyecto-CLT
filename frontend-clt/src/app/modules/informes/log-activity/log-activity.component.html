<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb
        [title]="breadscrum.title"
        [items]="breadscrum.items"
        [active_item]="breadscrum.active"
      >
      </app-breadcrumb>
    </div>
    }

    <div class="container">
      <mat-form-field>
        <mat-label>Ingrese rango de fechas</mat-label>
        <mat-date-range-input [rangePicker]="picker">
          <input
            matStartDate
            placeholder="Start date"
            [(ngModel)]="startDate"
          />
          <input matEndDate placeholder="End date" [(ngModel)]="endDate" />
        </mat-date-range-input>
        <mat-datepicker-toggle
          matIconSuffix
          [for]="picker"
        ></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
      </mat-form-field>

      <app-select-usuario
        (usuarioSeleccionado)="handleUsuarioSeleccionado($event.id)"
      ></app-select-usuario>

      <button
        *ngIf="!isLoading"
        mat-raised-button
        color="primary"
        (click)="buscar()"
      >
        <mat-icon>track_changes</mat-icon> Buscar
      </button>
      <button mat-raised-button color="primary" *ngIf="isLoading">
        Buscando...
        <mat-icon
          ><mat-spinner color="accent" diameter="19"> </mat-spinner
        ></mat-icon>
      </button>
      <br />

      <div>
        <button mat-raised-button class="green-button" (click)="exportArray()">
          <mat-icon>insert_drive_file</mat-icon> Exportar a Excel
        </button>

        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <!-- Columnas de la tabla -->
          <ng-container matColumnDef="Fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let ActivityLog">
              {{ ActivityLog.fecha }}
            </td>
          </ng-container>
          <ng-container matColumnDef="Etiqueta">
            <th mat-header-cell *matHeaderCellDef>Etiqueta</th>
            <td mat-cell *matCellDef="let ActivityLog">
              {{ ActivityLog.etiqueta }}
            </td>
          </ng-container>
          <ng-container matColumnDef="Componente">
            <th mat-header-cell *matHeaderCellDef>Componente</th>
            <td mat-cell *matCellDef="let ActivityLog">
              {{ ActivityLog.componente }}
            </td>
          </ng-container>
          <ng-container matColumnDef="Bateria">
            <th mat-header-cell *matHeaderCellDef>Bateria</th>
            <td mat-cell *matCellDef="let ActivityLog">
              <mat-icon
                *ngIf="ActivityLog.bateria > 80"
                style="color: green"
                class="battery-icon"
                >battery_full</mat-icon
              >
              <mat-icon
                *ngIf="ActivityLog.bateria > 20 && ActivityLog.bateria <= 80"
                style="color: rgb(245, 149, 24)"
                class="battery-icon"
                >battery_std</mat-icon
              >
              {{ ActivityLog.bateria }}%
            </td>
          </ng-container>

          <!-- Encabezados de la tabla -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <!-- Fila de datos -->
          <tr
            mat-row
            *matRowDef="let inventario; columns: displayedColumns"
          ></tr>
        </table>

        <!-- Mensaje cuando no hay datos
          <p *ngIf="noData">No se encontraron datos.</p> -->
        <mat-paginator
          [pageSize]="5"
          [pageSizeOptions]="[5, 10, 25]"
        ></mat-paginator>
      </div>
    </div>
  </div>
</section>
