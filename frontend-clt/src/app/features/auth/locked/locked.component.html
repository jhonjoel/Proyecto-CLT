<div class="auth-container">
  <div class="row auth-main">
    <div class="col-sm-6 px-0 d-none d-sm-block">
      <div class="left-img" style="background-image: url(assets/images/pages/bg-01.png)"></div>
    </div>
    <div class="col-sm-6 auth-form-section">
      <div class="form-section">
        <div class="auth-wrapper">
          <form class="validate-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">
            <div class="auth-locked">
              <div class="image">
                <img src="assets/images/usrbig.jpg" alt="User" />
              </div>
            </div>
            <span class="auth-locked-title p-b-34 p-t-27">Usuario bloqueado</span>
            <div class="row">
              <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                <mat-form-field class="example-full-width" appearance="outline">
                  <mat-label>Contraseña</mat-label>
                  <input matInput formControlName="password" [type]="hide ? 'password' : 'text'" />
                  <mat-icon matSuffix (click)="hide = !hide">{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                  @if (authForm.get('password')?.hasError('required')) {
                    <mat-error>Contraseña es requerida</mat-error>
                  }
                </mat-form-field>
              </div>
            </div>
            <div class="container-auth-form-btn mt-5">
              <button mat-raised-button color="primary" class="auth-form-btn" [disabled]="!authForm.valid" type="submit">
                Desbloquear
              </button>
            </div>
            <div class="w-full p-t-15 p-b-15 text-center">
              <a routerLink="/auth/login" class="txt1">¿Necesitas ayuda?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
